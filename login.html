<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Cash App</title>
    <!-- Tailwind Css Cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI Cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
  </head>

  <body
    class="bg-[#f4f5f7] h-[100vh] flex flex-col justify-center items-center"
  >
    <div
      class="h-[150px] w-[316px] bg-[url(./assets/bg.png)] bg-cover flex justify-center items-center"
    >
      <img src="./assets/Group.png" alt="" />
    </div>

    <form class="w-[400px] h-[320px] flex flex-col justify-center bg-white rounded-2xl p-8">
      <div>
        <label class="font-semibold" for="">Mobile Number</label> <br />
        <input
         id="mobile-number"
          type="text"
          placeholder="Enter Your Number"
          class="input bg-[#f4f5f7] my-3 rounded-3xl"
        />
      </div>
      <div>
        <label class="font-semibold" for="">4 Digit Pin</label> <br />
        <input
         id="pin-number"
          type="text"
          placeholder="Enter 4 Digit Pin"
          class="input bg-[#f4f5f7] mt-3 rounded-3xl"
        />
      </div>
      <button id="login-btn"
        class="btn bg-[#0874F2] text-white font-semibold mt-5 w-full rounded-3xl"
      >
        Login
      </button>
    </form>

    <!-- js link -->
     <script src="script.js"></script>
  </body>
</html>
