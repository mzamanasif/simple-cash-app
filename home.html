<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <!-- Tailwind Css Cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI Cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#f4f5f7] h-[100vh]">
    <div class="max-w-lg mx-auto bg-white rounded-b-xl">
      <!-- nav section  -->
      <div
        class="flex justify-between items-center min-h-[50px] border-b-1 border-gray-400 p-3"
      >
        <div class="flex">
          <img class="h-[50px] w-[50px]" src="./assets/Group.png" alt="" />
          <div class="ml-3">
            <h2 class="font-bold">$<span id="available-balance">0</span></h2>
            <p class="text-[#08080880]">Available Balance</p>
          </div>
        </div>
        <div>
          <button class="btn text-[#08080880]">
            <i
              class="fa-solid fa-arrow-right-from-bracket rotate-180 text-gray-700"
            ></i
            >Log Out
          </button>
        </div>
      </div>

      <!-- Page title section here -->
      <div class="mt-8 p-3">
        <h1 class="text-2xl font-bold">🔥 Welcome to Cash App!</h1>
        <p class="text-[#08080880] mt-1">
          Enjoy easy and convenient financial services with us. <br />
          Cashout charge is low and
        </p>
      </div>

      <!-- menu section start -->
      <div class="grid grid-cols-3 gap-3 p-3">
        <div
          id="add-button"
          class="w-[130px] h-[90px] border-2 border-gray-300 text-center p-3 rounded-xl"
        >
          <img class="mx-auto" src="./assets/wallet1.png" alt="" />
          <h2>Add Money</h2>
        </div>

        <div
          id="cash-out-button"
          class="w-[130px] h-[90px] border-2 border-gray-300 text-center p-3 rounded-xl"
        >
          <img class="mx-auto" src="./assets/send1.png" alt="" />
          <h2>Cash Out</h2>
        </div>

        <div
          class="w-[130px] h-[90px] border-2 border-gray-300 text-center p-3 rounded-xl"
        >
          <img class="mx-auto" src="./assets/money1.png" alt="" />
          <h2>Transfer Money</h2>
        </div>

        <div
          class="w-[130px] h-[90px] border-2 border-gray-300 text-center p-3 rounded-xl"
        >
          <img class="mx-auto" src="./assets/bonus1.png" alt="" />
          <h2>Get Bonus</h2>
        </div>

        <div
          class="w-[130px] h-[90px] border-2 border-gray-300 text-center p-3 rounded-xl"
        >
          <img class="mx-auto" src="./assets/purse1.png" alt="" />
          <h2>Pay Bill</h2>
        </div>

        <div
          class="w-[130px] h-[90px] border-2 border-gray-300 text-center p-3 rounded-xl"
        >
          <img class="mx-auto" src="./assets/transaction1.png" alt="" />
          <h2>Transactions</h2>
        </div>
      </div>
    </div>

    <!-- all from section -->
    <div class="max-w-lg mx-auto">
      <!-- add money form start -->
      <div id="add-money-parent">
        <h1 class="my-5 font-bold">Add Money</h1>
        <form action="" class="bg-white rounded-2xl p-8">
          <div>
            <label class="font-semibold" for="">Select A Bank</label> <br />
            <select
              id="bank"
              class="select w-full bg-[#f4f5f7] my-3 rounded-3xl"
            >
              <option>Select Bank</option>
              <option>AB Bank</option>
              <option>Brake Bank</option>
              <option>Dutch Bangla Bank</option>
            </select>
          </div>

          <div>
            <label class="font-semibold" for="">Bank Account Number</label>
            <br />
            <input
              id="account-number"
              type="text"
              placeholder="Enter 11 digit account number"
              class="input w-full bg-[#f4f5f7] my-3 rounded-3xl"
            />
          </div>
          <div>
            <label class="font-semibold" for="">Amount to Add</label> <br />
            <input
              id="add-amount"
              type="text"
              placeholder="Add amount to withdraw"
              class="input w-full bg-[#f4f5f7] my-3 rounded-3xl"
            />
          </div>
          <div>
            <label class="font-semibold" for="">Pin Number</label> <br />
            <input
              id="add-pin"
              type="text"
              placeholder="Enter 4 digit pin number"
              class="input w-full bg-[#f4f5f7] my-3 rounded-3xl"
            />
          </div>

          <button
            id="add-money-btn"
            class="btn bg-[#0874F2] text-white font-semibold mt-5 w-full rounded-3xl"
          >
            Add Money
          </button>
        </form>
      </div>

      <!-- cash out form -->
      <div id="cash-out-parent" style="display: none">
        <h1 class="my-5 font-bold">Cash Out</h1>
        <form action="" class="bg-white rounded-2xl p-8">
          <div>
            <label class="font-semibold" for="">Agent Number</label>
            <br />
            <input
              type="text"
              placeholder="Enter 11 digit number"
              class="input w-full bg-[#f4f5f7] my-3 rounded-3xl"
            />
          </div>
          <div>
            <label class="font-semibold" for="">Amount</label> <br />
            <input
              id="withdraw-amount"
              type="text"
              placeholder="Enter amount to withdraw"
              class="input w-full bg-[#f4f5f7] my-3 rounded-3xl"
            />
          </div>
          <div>
            <label class="font-semibold" for="">Pin Number</label> <br />
            <input
              type="text"
              placeholder="Enter 4 digit pin number"
              class="input w-full bg-[#f4f5f7] my-3 rounded-3xl"
            />
          </div>

          <button
            id="withdraw-button"
            class="btn bg-[#0874F2] text-white font-semibold mt-5 w-full rounded-3xl"
          >
            Withdraw Money
          </button>
        </form>
      </div>
    </div>

    <!-- script file linkup -->
    <script src="./home.js"></script>
  </body>
</html>
